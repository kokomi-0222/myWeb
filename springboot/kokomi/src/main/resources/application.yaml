      max-request-size: 2MB       # 整个请求最大 2MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 'QQ1063627264.'
    url: jdbc:mysql://localhost:3306/kokomi?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
